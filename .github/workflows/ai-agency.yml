name: AI Agency Discovery

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      agent:
        description: 'Choose which agent to run'
        required: true
        default: 'bolt'
        type: choice
        options:
          - bolt
          - sentinel
          - hammer

jobs:
  discovery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Run Performance Discovery (Bolt)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'bolt')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PROJECT_NUMBER: ${{ secrets.GH_PROJECT_NUMBER }}
          GH_PROJECT_OWNER: ${{ secrets.GH_PROJECT_OWNER }}
          GH_STATUS_FIELD_ID: ${{ secrets.GH_STATUS_FIELD_ID }}
          GH_IN_PROGRESS_OPTION_ID: ${{ secrets.GH_IN_PROGRESS_OPTION_ID }}
        run: bun src/commands/ai-agency.ts bolt

      - name: Run Security Discovery (Sentinel)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'sentinel')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PROJECT_NUMBER: ${{ secrets.GH_PROJECT_NUMBER }}
          GH_PROJECT_OWNER: ${{ secrets.GH_PROJECT_OWNER }}
          GH_STATUS_FIELD_ID: ${{ secrets.GH_STATUS_FIELD_ID }}
          GH_IN_PROGRESS_OPTION_ID: ${{ secrets.GH_IN_PROGRESS_OPTION_ID }}
        run: bun src/commands/ai-agency.ts sentinel

      - name: Run Execution Agent (Hammer)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.agent == 'hammer'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PROJECT_NUMBER: ${{ secrets.GH_PROJECT_NUMBER }}
          GH_PROJECT_OWNER: ${{ secrets.GH_PROJECT_OWNER }}
          GH_STATUS_FIELD_ID: ${{ secrets.GH_STATUS_FIELD_ID }}
          GH_IN_PROGRESS_OPTION_ID: ${{ secrets.GH_IN_PROGRESS_OPTION_ID }}
        run: bun src/commands/ai-agency.ts hammer

name: Deploy Docs (Preview)

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.0.1
        with:
          bun-version: latest

      - name: Install documentation dependencies
        run: bun install
        working-directory: docs

      - name: Install VHS & Dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/keyrings/charm.list
          sudo apt-get update && sudo apt-get install -y vhs ffmpeg ttyd

      - name: Generate Visual Assets (GIFs)
        run: |
          for tape in .agent/*.tape; do
            echo "🎥 Processing $tape..."
            vhs < "$tape"
          done

      - name: Set version
        id: set_version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          else
            LATEST_RELEASE=$(curl -s https://api.github.com/repos/rslucena/TypeScript-Boilerplate/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
            VERSION=$(echo ${LATEST_RELEASE:-"1.0.0"} | sed 's/^v//')
          fi
          # Capitalize environment name (e.g. main -> Main)
          ENV_NAME=$(echo "${{ github.ref_name }}" | sed 's/.*/\u&/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV

      - name: Build VitePress docs
        run: bun run build
        working-directory: docs
        env:
          VITE_APP_VERSION: ${{ env.VERSION }}
          VITE_APP_ENV: ${{ env.ENV_NAME }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          destination_dir: .
          keep_files: true

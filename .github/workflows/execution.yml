name: Auto-Execution Agent

on:
  workflow_dispatch:

jobs:
  execution:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ secrets.GH_AGENCY_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Hammer Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENCY_TOKEN }}
        run: bun src/automations/execution.ts